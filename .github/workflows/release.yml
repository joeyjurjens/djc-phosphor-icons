name: Create Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get Phosphor version
        id: phosphor
        run: echo "version=$(cat djc_phosphor_icons/phosphor_version.txt)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --draft \
            --notes "Synced with [Phosphor Icons ${{ steps.phosphor.outputs.version }}](https://github.com/phosphor-icons/homepage/releases/tag/${{ steps.phosphor.outputs.version }})."
