name: Update Icons

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - run: uv sync

      - name: Check for new icons
        id: check
        run: uv run python scripts/check_new_icons.py

      - name: Download updated icons
        if: steps.check.outputs.has_new == 'true'
        run: uv run python scripts/download_icons.py ${{ steps.check.outputs.new_version }}

      - name: Regenerate preview
        if: steps.check.outputs.has_new == 'true'
        run: uv run python scripts/preview_icons.py

      - name: Bump version
        id: version
        if: steps.check.outputs.has_new == 'true'
        run: |
          uv version --bump patch
          echo "new_version=$(uv version --short)" >> $GITHUB_OUTPUT

      - name: Commit and tag
        if: steps.check.outputs.has_new == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add djc_phosphor_icons/svgs/ djc_phosphor_icons/phosphor_version.txt pyproject.toml README.md preview.html
          git commit -m "chore: sync with phosphor ${{ steps.check.outputs.new_version }}"
          git tag "v${{ steps.version.outputs.new_version }}"
          git push && git push --tags
